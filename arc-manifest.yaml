schema: arc/v1
name: soma
version: 0.8.6
type: tool
tier: community
description: Substrate-portable Personal AI Assistant core for identity, memory, ISA, skills, learning, and adapters.
license: MIT
repository: https://github.com/the-metafactory/soma

authors:
  - Jens-Christian Fischer
  - Andreas Aaström

runtime:
  substrates:
    - codex
    - pi-dev
    - claude-code
    - cursor
    - cortex

provides:
  cli:
    - name: soma
      command: bun src/cli.ts
      description: Soma CLI for initialization, projection, diagnosis, memory, and Algorithm runs.
  skill:
    - name: Soma
      path: skill/
      trigger: portable personal assistant
    - name: Soma
      path: skill/
      trigger: substrate-neutral assistant core
    - name: Soma
      path: skill/
      trigger: portable assistant core across Codex Pi Claude Cortex

capabilities:
  filesystem:
    read:
      - "~/work/**"
    write:
      - "~/.config/soma/**"
      - "~/.soma/memory/STATE/**"
  bash:
    allowed: true
    restricted_to:
      - bun
      - tsc

bundle:
  exclude:
    - .worktrees
    - .pi
    - .tmp-tests
    - .specflow
