# GENERATED by compass/tools/rollout-gate.ts — confidentiality gate caller.
# Calls the reusable warn-only confidentiality gate in the-metafactory/metafactory-actions, pinned by
# commit SHA (never a tag/branch) so a moved tag cannot swap the gate or engine.
# Bump via rollout-gate.ts, never by hand.
#
# WARN-ONLY BURN-IN: this standalone workflow is NOT enrolled in any required
# status check, so a finding here never blocks a merge. require_denylist:false
# degrades the same-repo path to tiers 1+2 + a warning instead of failing closed
# when the denylist secret is absent. A principal flips enforcement later by
# adding this check context to the repo ruleset (rollout-gate.ts --rulesets) —
# deliberately NOT done here.
name: confidentiality-gate
on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
permissions:
  contents: read
jobs:
  gate:
    uses: the-metafactory/metafactory-actions/.github/workflows/confidentiality-gate.yml@8ed0ab26f804aa98f74dcdcaf86917e09459f874
    permissions:
      contents: read
    with:
      # engine_sha MUST equal the uses:@<sha> pin above so the engine stays
      # byte-matched to the gate (reusable contract M-8; a REQUIRED input —
      # the reusable fails closed without it).
      engine_sha: 8ed0ab26f804aa98f74dcdcaf86917e09459f874
      require_denylist: false
    secrets:
      # Explicit named secrets only — never `secrets: inherit` (that hands every
      # caller secret to the reusable). Absent on a repo without the org secret
      # => empty => degraded tiers 1+2 + warn (require_denylist:false above).
      MF_CONFIDENTIALITY_DENYLIST: ${{ secrets.MF_CONFIDENTIALITY_DENYLIST }}
      CONF_DENYLIST_PEPPER: ${{ secrets.CONF_DENYLIST_PEPPER }}
